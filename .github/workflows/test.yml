name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lua-tests:
    name: Lua Core Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1

      - name: Run Lua core tests
        run: lua tests/test_session_pulse.lua

  lua-runtime-tests:
    name: Lua Runtime Queue Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get update && sudo apt-get install -y lua5.1

      - name: Run Lua runtime queue tests
        run: lua tests/test_runtime_queue.lua

  js-tests:
    name: JS Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run JS tests
        run: node tests/test_frontend.js
