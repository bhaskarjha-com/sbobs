<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SessionPulse — Control Dock</title>
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24253a;
    --surface-hover: #2d2e45;
    --surface-active: #363852;
    --border: rgba(255, 255, 255, 0.06);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --focus-color: #22c55e;
    --short-break-color: #3b82f6;
    --long-break-color: #a855f7;
    --stopwatch-color: #f59e0b;
    --countdown-color: #f97316;
    --overtime-color: #ef4444;
    --idle-color: #475569;
    --danger: #ef4444;
    --ws-connected: #22c55e;
    --ws-disconnected: #ef4444;
    --ws-connecting: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Segoe UI Variable', 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    padding: 12px;
    min-width: 200px;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }

  .header-badges {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-badge {
    font-size: 0.5rem;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ws-indicator {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .ws-indicator:hover { background: var(--surface-hover); }
  .ws-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ws-disconnected);
    transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--ws-connected); }
  .ws-dot.connecting { background: var(--ws-connecting); animation: blink 1s infinite; }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    padding: 1px 4px;
    border-radius: 4px;
  }
  .state-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ws-disconnected);
    transition: background 0.3s;
  }
  .state-dot.connected { background: var(--ws-connected); }
  .state-dot.connecting { background: var(--ws-connecting); animation: blink 1s infinite; }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--idle-color);
    transition: background 0.3s;
  }
  .status-dot.running { background: var(--focus-color); }
  .status-dot.paused { background: #eab308; animation: blink 1.5s infinite; }
  .status-dot.overtime { background: var(--overtime-color); animation: blink 0.8s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .timer-section {
    text-align: center;
    padding: 8px 0 6px;
  }

  .session-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 8px;
    transition: background 0.3s, color 0.3s;
  }
  .session-badge.focus { background: rgba(34, 197, 94, 0.15); color: var(--focus-color); }
  .session-badge.short-break { background: rgba(59, 130, 246, 0.15); color: var(--short-break-color); }
  .session-badge.long-break { background: rgba(168, 85, 247, 0.15); color: var(--long-break-color); }
  .session-badge.idle { background: rgba(71, 85, 105, 0.2); color: var(--text-muted); }
  .session-badge.stopwatch { background: rgba(245, 158, 11, 0.15); color: var(--stopwatch-color); }
  .session-badge.countdown { background: rgba(249, 115, 22, 0.15); color: var(--countdown-color); }
  .session-badge.custom { background: rgba(34, 197, 94, 0.15); color: var(--focus-color); }
  .session-badge.overtime { background: rgba(239, 68, 68, 0.15); color: var(--overtime-color); }

  .time-display {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    transition: color 0.3s;
  }
  .time-display.idle { color: var(--text-muted); }
  .time-display.overtime { color: var(--overtime-color); }

  .next-up {
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Control Buttons */
  .controls {
    display: flex;
    gap: 3px;
    margin: 6px 0 3px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 6px 2px;
    font-size: 0.62rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
  .ctrl-btn:active { background: var(--surface-active); transform: scale(0.97); }
  .ctrl-btn.primary {
    background: rgba(34, 197, 94, 0.15);
    border-color: rgba(34, 197, 94, 0.25);
    color: var(--focus-color);
  }
  .ctrl-btn.primary:hover { background: rgba(34, 197, 94, 0.25); }
  .ctrl-btn.danger {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.2);
    color: var(--danger);
  }
  .ctrl-btn.danger:hover { background: rgba(239, 68, 68, 0.2); }
  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
  }
  .ctrl-btn .icon { font-size: 0.8rem; }

.controls-row2 {
  display: flex;
  gap: 3px;
  margin-bottom: 4px;
}
.controls-row2 .ctrl-btn {
  padding: 4px 2px;
  font-size: 0.55rem;
}
.controls-row2 .ctrl-btn .icon {
  font-size: 0.7rem;
}

  .progress-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }
  .progress-track {
    height: 6px;
    background: var(--surface);
    border-radius: 99px;
    overflow: hidden;
    flex: 1;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 0.8s ease, background 0.3s;
  }
  .progress-fill.focus { background: var(--focus-color); }
  .progress-fill.short-break { background: var(--short-break-color); }
  .progress-fill.long-break { background: var(--long-break-color); }
  .progress-fill.stopwatch { background: var(--stopwatch-color); }
  .progress-fill.countdown { background: var(--countdown-color); }
  .progress-fill.custom { background: var(--focus-color); }
  .progress-fill.overtime { background: var(--overtime-color); }
  .progress-fill.idle { background: var(--idle-color); }

  .transition-msg {
    text-align: center;
    font-size: 0.68rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 2px 0;
    min-height: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .transition-msg.visible { opacity: 1; min-height: 18px; }

  .break-suggestion {
    text-align: center;
    font-size: 0.58rem;
    color: var(--text-muted);
    font-style: italic;
    padding: 2px 0;
    min-height: 0;
  }

  .stats-compact {
    margin-top: 4px;
    padding: 7px 10px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 0.62rem;
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    line-height: 1.7;
  }
  .stats-line {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
  }
  .stats-line + .stats-line {
    border-top: 1px solid var(--border);
    padding-top: 4px;
    margin-top: 4px;
  }
  .stat-val {
    font-weight: 700;
    color: var(--text-primary);
  }
  .stat-sep {
    color: var(--text-muted);
    margin: 0 4px;
    opacity: 0.5;
  }

  .chat-copy {
    margin-top: 4px;
    padding: 4px 8px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 0.55rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 22px;
  }
  .chat-copy:hover { background: var(--surface-hover); }
  .chat-copy .label { font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .chat-copy .value { color: var(--text-secondary); font-variant-numeric: tabular-nums; font-size: 0.52rem; }
  .chat-copy.copied { background: rgba(34, 197, 94, 0.15); }
  .chat-copy.copied .label { color: var(--focus-color); }

  /* Collapsible sections */
  .collapsible-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    margin-top: 4px;
    padding: 5px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-secondary);
    font: inherit;
    font-size: 0.55rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .collapsible-toggle:hover { background: var(--surface-hover); }
  .collapsible-toggle .chevron {
    transition: transform 0.2s;
    font-size: 0.6rem;
  }
  .collapsible-toggle.open .chevron { transform: rotate(90deg); }
  .collapsible-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
  }
  .collapsible-body.open {
    max-height: 400px;
  }
  .collapsible-body-inner {
    padding: 8px 0 0;
  }

  .status-editor {
    margin-top: 0;
    padding: 0;
    background: none;
    border: none;
    border-radius: 0;
  }

  .status-editor-head {
    display: none;
  }

  .status-editor-meta-inline {
    font-size: 0.5rem;
    color: var(--text-muted);
  }

  .status-editor-input,
  .status-editor-duration {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
    padding: 6px 8px;
    font: inherit;
    font-size: 0.58rem;
  }

  .status-editor-input {
    min-height: 44px;
    resize: vertical;
    margin-bottom: 6px;
  }

  .status-editor-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  .status-editor-label {
    min-width: 52px;
    font-size: 0.5rem;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .status-editor-help,
  .status-editor-feedback {
    font-size: 0.48rem;
    color: var(--text-muted);
  }

  .status-editor-actions {
    display: flex;
    gap: 4px;
    margin: 6px 0 4px;
  }

  .status-editor-btn {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    background: rgba(255, 255, 255, 0.04);
    color: var(--text-primary);
    font: inherit;
    font-size: 0.55rem;
    font-weight: 600;
    cursor: pointer;
  }

  .status-editor-btn.primary {
    background: rgba(34, 197, 94, 0.16);
    border-color: rgba(34, 197, 94, 0.24);
    color: var(--focus-color);
  }

  .status-editor-btn.danger {
    background: rgba(239, 68, 68, 0.14);
    border-color: rgba(239, 68, 68, 0.22);
    color: var(--danger);
  }

  .status-editor-btn:disabled,
  .status-editor-input:disabled,
  .status-editor-duration:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .footer {
    margin-top: 6px;
    padding-top: 4px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.48rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">SessionPulse</span>
  <div class="header-badges">
    <span class="mode-badge" id="modeBadge">pomodoro</span>
    <div class="state-indicator" id="stateIndicator" title="Dock state file connection">
      <div class="state-dot connecting" id="stateDot"></div>
      <span id="stateLabel">DATA</span>
    </div>
    <div class="ws-indicator" id="wsIndicator" title="Click to reconnect">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">WS</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</div>

<div class="timer-section">
  <div class="session-badge idle" id="badge">Ready</div>
  <div class="time-display idle" id="time">--:--</div>
  <div class="next-up" id="nextUp"></div>
</div>

<!-- Control Buttons -->
<div class="controls" id="controlsRow">
  <button class="ctrl-btn primary" id="btnStartPause" title="Start / Pause">
    <span class="icon">▶</span> <span id="btnStartPauseLabel">Start</span>
  </button>
  <button class="ctrl-btn" id="btnSkip" title="Skip Session">
    <span class="icon">⏭</span> Skip
  </button>
  <button class="ctrl-btn danger" id="btnStop" title="Stop">
    <span class="icon">⏹</span> Stop
  </button>
</div>
<div class="controls-row2" id="controlsRow2">
  <button class="ctrl-btn" id="btnResumePrevious" title="Resume Previous Session">
    <span class="icon">⏪</span> Resume
  </button>
  <button class="ctrl-btn" id="btnSubTime" title="Subtract Time">
    <span class="icon">−</span> Time
  </button>
  <button class="ctrl-btn" id="btnAddTime" title="Add Time">
    <span class="icon">+</span> Time
  </button>
  <button class="ctrl-btn danger" id="btnReset" title="Reset All">
    <span class="icon">↺</span> Reset
  </button>
</div>

<div class="progress-row">
  <div class="progress-track">
    <div class="progress-fill idle" id="progressFill"></div>
  </div>
</div>
<div class="break-suggestion" id="suggestion"></div>
<div class="transition-msg" id="transition"></div>

<div class="stats-compact">
  <div class="stats-line" id="statsLine1">
    <span><span class="stat-val" id="sessions">0/0</span> sessions</span>
    <span class="stat-sep">·</span>
    <span><span class="stat-val" id="focusTime">0m</span> focus</span>
    <span class="stat-sep">·</span>
    <span><span class="stat-val" id="elapsed">0%</span></span>
  </div>
  <div class="stats-line" id="statsLine2">
    <span>Cycle <span class="stat-val" id="cycle">0</span></span>
    <span class="stat-sep" id="streamSep" style="display:none">·</span>
    <span id="streamItem" style="display:none">Stream <span class="stat-val" id="streamTime">--</span></span>
  </div>
</div>

<div id="dailyGoalRow" style="display:none; margin-top:4px;">
  <div style="display:flex; justify-content:space-between; font-size:0.5rem; color:#94a3b8; margin-bottom:2px; padding:0 2px;">
    <span id="dailyGoalText">Daily Goal</span>
    <span id="dailyGoalPct">0%</span>
  </div>
  <div class="progress-track" style="height:4px; flex:unset;">
    <div class="progress-fill" id="dailyGoalFill" style="width:0%; transition:width 0.5s;"></div>
  </div>
</div>

<div class="chat-copy" id="chatCopy" style="display:none" title="Click to copy chat status">
  <span class="label">Chat</span>
  <span class="value" id="chatStatus">--</span>
</div>

<div class="chat-copy" id="labelRow" style="display:none" title="Session label">
  <span class="label">Label</span>
  <span class="value" id="sessionLabel">--</span>
</div>

<div class="chat-copy" id="statusRow" style="display:none" title="Manual status / AFK message">
  <span class="label">Status</span>
  <span class="value" id="statusMessage">--</span>
</div>

<button class="collapsible-toggle" id="statusToggle" type="button">
  <span>SP Status <span class="status-editor-meta-inline" id="statusEditorMeta">Inactive</span></span>
  <span class="chevron">▸</span>
</button>
<div class="collapsible-body" id="statusBody">
  <div class="collapsible-body-inner">
    <div class="status-editor" id="statusEditor">
      <textarea class="status-editor-input" id="statusEditorMessage" placeholder="AFK message..." maxlength="240"></textarea>
      <div class="status-editor-row">
        <span class="status-editor-label">Min</span>
        <input class="status-editor-duration" id="statusEditorDuration" type="number" min="0" max="10080" step="1" value="0">
      </div>
      <div class="status-editor-actions">
        <button class="status-editor-btn primary" id="btnStatusApply" type="button">Apply</button>
        <button class="status-editor-btn danger" id="btnStatusClear" type="button">Clear</button>
      </div>
      <div class="status-editor-feedback" id="statusEditorFeedback"></div>
    </div>
  </div>
</div>

<div class="footer" id="footerText">
  v6.0.0 · Hotkeys or buttons to control
</div>

<script>

// ── Config ──
const POLL_INTERVAL = 750;
const WS_PROBE_INTERVAL = 15000;
const WS_TIMEOUT_MS = 4000;

// Parse URL params: ?ws_port=4455&ws_password=xxx
const params = new URLSearchParams(window.location.search);
const wsPort = params.get('ws_port') || localStorage.getItem('obs_ws_port') || '4455';
const wsPassword = params.get('ws_password') || localStorage.getItem('obs_ws_password') || '';

function normalizePathInput(raw) {
  if (!raw) return '';
  if (/^[a-zA-Z]:[\\/]/.test(raw)) {
    return 'file:///' + raw.replace(/\\/g, '/');
  }
  return raw;
}

const statePathOverride = normalizePathInput(
  params.get('state_path') || localStorage.getItem('sessionpulse_state_path') || ''
);

// Persist config
if (params.get('ws_port')) localStorage.setItem('obs_ws_port', wsPort);
if (params.get('ws_password')) localStorage.setItem('obs_ws_password', wsPassword);
if (params.get('state_path')) localStorage.setItem('sessionpulse_state_path', statePathOverride);

// ── DOM Elements ──
const timeEl = document.getElementById('time');
const badgeEl = document.getElementById('badge');
const statusDot = document.getElementById('statusDot');
const modeBadge = document.getElementById('modeBadge');
const progressFill = document.getElementById('progressFill');
const transEl = document.getElementById('transition');
const suggestionEl = document.getElementById('suggestion');
const nextUpEl = document.getElementById('nextUp');
const sessionsEl = document.getElementById('sessions');
const focusTimeEl = document.getElementById('focusTime');
const cycleEl = document.getElementById('cycle');
const elapsedEl = document.getElementById('elapsed');
const streamTimeEl = document.getElementById('streamTime');
const chatStatusEl = document.getElementById('chatStatus');
const chatCopyEl = document.getElementById('chatCopy');
const stateDot = document.getElementById('stateDot');
const stateLabel = document.getElementById('stateLabel');
const wsDot = document.getElementById('wsDot');
const wsLabel = document.getElementById('wsLabel');
const wsIndicator = document.getElementById('wsIndicator');
const btnStartPause = document.getElementById('btnStartPause');
const btnStartPauseLabel = document.getElementById('btnStartPauseLabel');
const btnStop = document.getElementById('btnStop');
const btnSkip = document.getElementById('btnSkip');
const btnResumePrevious = document.getElementById('btnResumePrevious');
const btnAddTime = document.getElementById('btnAddTime');
const btnSubTime = document.getElementById('btnSubTime');
const btnReset = document.getElementById('btnReset');
const statusEditorMessage = document.getElementById('statusEditorMessage');
const statusEditorDuration = document.getElementById('statusEditorDuration');
const statusEditorMeta = document.getElementById('statusEditorMeta');
const statusEditorFeedback = document.getElementById('statusEditorFeedback');
const btnStatusApply = document.getElementById('btnStatusApply');
const btnStatusClear = document.getElementById('btnStatusClear');
const footerText = document.getElementById('footerText');

const BADGE_CLASSES = {
  'Focus': 'focus', 'Short Break': 'short-break', 'Long Break': 'long-break',
};

// ── OBS WebSocket ──
let wsConnected = false;
let controlActionInFlight = false;
let wsProbeTimer = null;
let stateConnected = false;
let actionRefreshTimers = [];
let statusDraftDirty = false;
let statusCommandInFlight = false;

function setControlButtonsBusy(busy) {
  controlActionInFlight = busy;
  [btnStartPause, btnStop, btnSkip, btnResumePrevious, btnAddTime, btnSubTime, btnReset].forEach(button => {
    button.disabled = busy;
  });
  syncStatusEditorInteractivity();
}

function setWsStatus(status) {
  wsDot.className = 'ws-dot ' + status;
  wsLabel.textContent = status === 'connected' ? 'WS OK' : status === 'connecting' ? 'WS...' : 'WS X';
  wsConnected = (status === 'connected');
  if (!controlActionInFlight) {
    [btnStartPause, btnStop, btnSkip, btnResumePrevious, btnAddTime, btnSubTime, btnReset].forEach(button => {
      button.disabled = !wsConnected;
    });
  }
  syncStatusEditorInteractivity();
}

function scheduleWsProbe() {
  if (pollStopped) return;
  if (wsProbeTimer) clearTimeout(wsProbeTimer);
  wsProbeTimer = setTimeout(async () => {
    await connectWebSocket();
    scheduleWsProbe();
  }, WS_PROBE_INTERVAL);
}

const stateUrlCandidates = (() => {
  const urls = [];

  function push(url) {
    if (!url) return;
    urls.push(url);
  }

  function pushSiblingStateUrl(raw) {
    if (!raw) return;
    const text = String(raw);

    if (/timer_dock\.html/i.test(text)) {
      push(text.replace(/timer_dock\.html(?:\?[^#]*)?(?:#.*)?/i, 'session_state.json'));
    }

    const embeddedFileUrls = text.match(/file:\/\/\/[^"'<> \t\r\n]+/ig) || [];
    for (const fileUrl of embeddedFileUrls) {
      push(fileUrl.replace(/timer_dock\.html(?:\?[^#]*)?(?:#.*)?/i, 'session_state.json'));
    }
  }

  push(statePathOverride);
  pushSiblingStateUrl(window.location.href);
  pushSiblingStateUrl(document.URL);
  pushSiblingStateUrl(window.location.search);
  pushSiblingStateUrl(window.location.hash);

  try {
    push(new URL('session_state.json', window.location.href).href);
  } catch (error) {
    // Ignore invalid dock URL bases.
  }

  try {
    push(new URL('session_state.json', document.baseURI).href);
  } catch (error) {
    // Ignore invalid base URIs.
  }

  push('session_state.json');
  return [...new Set(urls.filter(Boolean))];
})();

let preferredStateUrl = stateUrlCandidates[0] || 'session_state.json';

function withCacheBust(url) {
  return url + (url.includes('?') ? '&' : '?') + 't=' + Date.now();
}

function fetchJsonViaXhr(url) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', withCacheBust(url), true);
    xhr.onreadystatechange = () => {
      if (xhr.readyState !== 4) return;
      if (xhr.status === 200 || (xhr.status === 0 && xhr.responseText)) {
        try {
          resolve(JSON.parse(xhr.responseText));
        } catch (error) {
          reject(error);
        }
      } else {
        reject(new Error(`XHR failed for ${url}: ${xhr.status}`));
      }
    };
    xhr.onerror = () => reject(new Error(`XHR error for ${url}`));
    xhr.send();
  });
}

async function fetchStateCandidate(url) {
  try {
    const resp = await fetch(withCacheBust(url), { cache: 'no-store' });
    if (!resp.ok) throw new Error(`Fetch failed for ${url}: ${resp.status}`);
    return await resp.json();
  } catch (error) {
    const isLocal = String(url).startsWith('file:') || window.location.protocol === 'file:';
    if (!isLocal) throw error;
    return fetchJsonViaXhr(url);
  }
}

function setStateStatus(status, detail) {
  stateDot.className = 'state-dot ' + status;
  stateLabel.textContent = status === 'connected' ? 'DATA OK' : status === 'connecting' ? 'DATA...' : 'DATA X';
  stateConnected = (status === 'connected');

  if (detail) {
    footerText.textContent = detail;
  } else if (stateConnected && wsConnected) {
    footerText.textContent = 'Live state + dock controls connected';
  } else if (stateConnected) {
    footerText.textContent = 'Read-only mode: state file connected';
  } else {
    footerText.textContent = 'v6.0.0 · Hotkeys or buttons to control';
  }
}

async function refreshStateSnapshot() {
  // Strategy: try SP Control via WebSocket first (primary), then state file (fallback).
  // SP Control is the most reliable source — it's always updated by the Lua script
  // and doesn't suffer from CEF file:// security restrictions.

  // Path 1: SP Control via WebSocket (primary)
  try {
    const controlState = await loadStateViaObsSources();
    if (controlState) {
      // Merge with state file data if available (adds fields like session_label, daily_goal, focus_streak)
      try {
        const jsonState = await loadStateJson();
        lastState = { ...jsonState, ...controlState };
      } catch (fileError) {
        lastState = controlState;
      }
      consecutiveFetchFailures = 0;
      setStateStatus('connected', 'Live state via SP Control');
      update(lastState);
      return;
    }
  } catch (controlError) {
    // SP Control unavailable — fall through to state file
  }

  // Path 2: State file fetch (fallback — works when served over HTTP, fails on file://)
  try {
    lastState = await loadStateJson();
    consecutiveFetchFailures = 0;
    setStateStatus('connected', `Read-only mode · ${preferredStateUrl}`);
    update(lastState);
    return;
  } catch (fileError) {
    // Both paths failed
    consecutiveFetchFailures += 1;
    const hint = wsConnected
      ? 'SP Control source not found — run Quick Setup'
      : 'WebSocket disconnected · enable OBS WebSocket Server';
    setStateStatus('disconnected', hint);
    if (consecutiveFetchFailures >= 2) {
      lastState = null;
      update(null);
    } else {
      update(lastState);
    }
  }
}

function scheduleActionStateRefresh(delayMs = 120) {
  const timerId = setTimeout(() => {
    actionRefreshTimers = actionRefreshTimers.filter(id => id !== timerId);
    refreshStateSnapshot().catch(() => {});
  }, delayMs);
  actionRefreshTimers.push(timerId);
}

function applyOptimisticActionState(hotkeyName) {
  const baseState = lastState ? { ...lastState } : null;
  if (!baseState) return;

  if (hotkeyName === 'session_pulse_start_pause') {
    if (baseState.is_running && !baseState.is_paused) {
      baseState.is_paused = true;
    } else {
      baseState.is_running = true;
      baseState.is_paused = false;
    }
  } else if (hotkeyName === 'session_pulse_stop' || hotkeyName === 'session_pulse_reset') {
    baseState.is_running = false;
    baseState.is_paused = false;
  } else if (hotkeyName === 'session_pulse_resume_previous') {
    baseState.is_running = true;
    baseState.is_paused = false;
  } else {
    syncStatusEditorFromState(null);
    return;
  }

  lastState = baseState;
  update(lastState);
}

function setStatusEditorFeedback(message, isError = false) {
  statusEditorFeedback.textContent = message || '';
  statusEditorFeedback.style.color = isError ? 'var(--danger)' : 'var(--text-muted)';
}

function setStatusEditorBusy(busy) {
  statusCommandInFlight = busy;
  syncStatusEditorInteractivity();
}

function syncStatusEditorInteractivity() {
  const disabled = !wsConnected || controlActionInFlight || statusCommandInFlight;
  statusEditorMessage.disabled = disabled;
  statusEditorDuration.disabled = disabled;
  btnStatusApply.disabled = disabled;
  btnStatusClear.disabled = disabled;
}

function updateStatusEditorMeta(state) {
  if (!state) {
    statusEditorMeta.textContent = 'State unavailable';
    return;
  }

  if (state.status_active && state.status_message) {
    if (state.status_until_epoch && state.status_until_epoch > 0) {
      const remainingSeconds = Math.max(0, state.status_until_epoch - Math.floor(Date.now() / 1000));
      const remainingMinutes = Math.ceil(remainingSeconds / 60);
      statusEditorMeta.textContent = remainingMinutes > 0 ? `Active · clears in ${remainingMinutes}m` : 'Active · clears soon';
    } else {
      statusEditorMeta.textContent = 'Active · until cleared';
    }
  } else {
    statusEditorMeta.textContent = 'Inactive';
  }
}

function syncStatusEditorFromState(state) {
  updateStatusEditorMeta(state);
  if (!state || statusDraftDirty || statusCommandInFlight) return;

  statusEditorMessage.value = state.status_message || '';
  if (state.status_active && state.status_until_epoch && state.status_until_epoch > 0) {
    const remainingSeconds = Math.max(0, state.status_until_epoch - Math.floor(Date.now() / 1000));
    statusEditorDuration.value = Math.ceil(remainingSeconds / 60);
  } else {
    statusEditorDuration.value = 0;
  }
}

function buildControlCommandPayload(command, extra = {}) {
  return JSON.stringify({
    kind: 'command',
    command,
    nonce: nextRequestId(),
    ...extra
  });
}

function buildStatusCommandPayload(command, message, durationMinutes) {
  return buildControlCommandPayload(command, {
    message: message || '',
    duration_minutes: durationMinutes || 0
  });
}

function getRequestedStatusDuration() {
  const value = parseInt(statusEditorDuration.value, 10);
  if (Number.isNaN(value)) return 0;
  return Math.max(0, Math.min(value, 10080));
}

async function sendStatusCommand(command, message, durationMinutes) {
  setStatusEditorBusy(true);
  try {
    await ensureControlBridgeInput();
    await callObs('SetInputSettings', {
      inputName: 'SP Control',
      inputSettings: {
        text: buildStatusCommandPayload(command, message, durationMinutes)
      },
      overlay: true
    });

    if (lastState) {
      const nextState = { ...lastState };
      if (command === 'show_status') {
        nextState.status_active = true;
        nextState.status_message = message;
        nextState.status_until_epoch = durationMinutes > 0
          ? Math.floor(Date.now() / 1000) + (durationMinutes * 60)
          : 0;
      } else {
        nextState.status_active = false;
        nextState.status_message = '';
        nextState.status_until_epoch = 0;
      }
      lastState = nextState;
      update(lastState);
    }

    statusDraftDirty = false;
    setStatusEditorFeedback(command === 'show_status' ? 'Status updated' : 'Status cleared');
    scheduleActionStateRefresh(90);
    scheduleActionStateRefresh(260);
  } catch (error) {
    setStatusEditorFeedback(error.message || 'Unable to update status', true);
  } finally {
    setStatusEditorBusy(false);
  }
}

async function sendResumePreviousCommand() {
  if (controlActionInFlight) return;
  setControlButtonsBusy(true);
  setWsStatus('connecting');
  try {
    await ensureControlBridgeInput();
    await callObs('SetInputSettings', {
      inputName: 'SP Control',
      inputSettings: {
        text: buildControlCommandPayload('resume_previous_session')
      },
      overlay: true
    });

    setWsStatus('connected');
    applyOptimisticActionState('session_pulse_resume_previous');
    scheduleActionStateRefresh(90);
    scheduleActionStateRefresh(260);
  } catch (error) {
    console.warn('[Dock] Resume command failed:', error.message);
    setWsStatus('disconnected');
  } finally {
    setControlButtonsBusy(false);
  }
}

function isMissingControlBridgeError(error) {
  const text = String(error && error.message ? error.message : error || '').toLowerCase();
  return (
    text.includes('sp control') ||
    text.includes('no source was found by the name') ||
    text.includes('no input was found by the name') ||
    text.includes('within the canvas')
  );
}

async function createControlBridgeInput() {
  const controlSceneName = 'SP Internal';
  const sceneList = await callObs('GetSceneList');
  const scenes = Array.isArray(sceneList && sceneList.scenes) ? sceneList.scenes : [];
  const hasControlScene = scenes.some(scene => scene && scene.sceneName === controlSceneName);

  if (!hasControlScene) {
    try {
      await callObs('CreateScene', { sceneName: controlSceneName });
    } catch (error) {
      const message = String(error && error.message ? error.message : error || '').toLowerCase();
      if (!message.includes('already exists')) {
        throw error;
      }
    }
  }

  let candidateInputKinds = [];
  try {
    const kindList = await callObs('GetInputKindList', { unversioned: false });
    const inputKinds = Array.isArray(kindList && kindList.inputKinds) ? kindList.inputKinds : [];
    const preferred = inputKinds.filter(kind => /^text_/i.test(kind));
    candidateInputKinds = preferred;
  } catch (error) {
    // Fall back to common kinds if the capability probe is unavailable.
  }

  if (!candidateInputKinds.length) {
    candidateInputKinds = ['text_gdiplus', 'text_ft2_source', 'text_gdiplus_v2', 'text_ft2_source_v2'];
  }

  let lastError = null;

  for (const inputKind of candidateInputKinds) {
    try {
      await callObs('CreateInput', {
        sceneName: controlSceneName,
        inputName: 'SP Control',
        inputKind,
        inputSettings: {
          text: ''
        },
        sceneItemEnabled: false
      });
      return;
    } catch (error) {
      lastError = error;
      const message = String(error && error.message ? error.message : error || '').toLowerCase();
      if (message.includes('already exists')) {
        return;
      }
    }
  }

  const kindSummary = candidateInputKinds.join(', ') || 'none';
  throw lastError || new Error(`Unable to create SP Control using supported text kinds: ${kindSummary}`);
}

async function ensureControlBridgeInput() {
  try {
    await callObs('GetInputSettings', { inputName: 'SP Control' });
    return;
  } catch (error) {
    if (!isMissingControlBridgeError(error)) throw error;
  }

  await createControlBridgeInput();
}

async function loadStateJson() {
  const candidates = preferredStateUrl
    ? [preferredStateUrl, ...stateUrlCandidates.filter(url => url !== preferredStateUrl)]
    : stateUrlCandidates;

  let lastError = null;
  for (const url of candidates) {
    try {
      const data = await fetchStateCandidate(url);
      preferredStateUrl = url;
      return data;
    } catch (error) {
      lastError = error;
    }
  }

  throw lastError || new Error('No session state source available');
}

function nextRequestId() {
  if (window.crypto && typeof window.crypto.randomUUID === 'function') {
    return window.crypto.randomUUID();
  }
  return `req-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

function delay(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function waitForSocketOpen(socket, timeoutMs) {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('WebSocket connection timed out'));
    }, timeoutMs);

    function cleanup() {
      clearTimeout(timeout);
      socket.removeEventListener('open', handleOpen);
      socket.removeEventListener('error', handleError);
    }

    function handleOpen() {
      cleanup();
      resolve();
    }

    function handleError() {
      cleanup();
      reject(new Error('WebSocket connection failed'));
    }

    socket.addEventListener('open', handleOpen);
    socket.addEventListener('error', handleError);
  });
}

function waitForSocketMessage(socket, predicate, timeoutMs) {
  return new Promise((resolve, reject) => {
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('WebSocket response timed out'));
    }, timeoutMs);

    function cleanup() {
      clearTimeout(timeout);
      socket.removeEventListener('message', handleMessage);
      socket.removeEventListener('close', handleClose);
      socket.removeEventListener('error', handleError);
    }

    function handleClose() {
      cleanup();
      reject(new Error('WebSocket closed unexpectedly'));
    }

    function handleError() {
      cleanup();
      reject(new Error('WebSocket error'));
    }

    function handleMessage(event) {
      let payload;
      try {
        payload = JSON.parse(event.data);
      } catch (error) {
        return;
      }

      if (!predicate(payload)) return;
      cleanup();
      resolve(payload);
    }

    socket.addEventListener('message', handleMessage);
    socket.addEventListener('close', handleClose);
    socket.addEventListener('error', handleError);
  });
}

async function sha256Base64(text) {
  const bytes = new TextEncoder().encode(text);
  const digest = await crypto.subtle.digest('SHA-256', bytes);
  let binary = '';
  const array = new Uint8Array(digest);
  for (let i = 0; i < array.length; i++) {
    binary += String.fromCharCode(array[i]);
  }
  return btoa(binary);
}

async function buildAuthenticationString(password, challenge, salt) {
  const secret = await sha256Base64((password || '') + salt);
  return sha256Base64(secret + challenge);
}

async function openObsSocket() {
  const socket = new WebSocket(`ws://127.0.0.1:${wsPort}`);
  await waitForSocketOpen(socket, WS_TIMEOUT_MS);

  const hello = await waitForSocketMessage(socket, payload => payload && payload.op === 0, WS_TIMEOUT_MS);
  const identify = {
    op: 1,
    d: {
      rpcVersion: 1
    }
  };

  const auth = hello && hello.d && hello.d.authentication;
  if (auth && auth.challenge && auth.salt) {
    identify.d.authentication = await buildAuthenticationString(wsPassword, auth.challenge, auth.salt);
  }

  socket.send(JSON.stringify(identify));
  await waitForSocketMessage(socket, payload => payload && payload.op === 2, WS_TIMEOUT_MS);
  return socket;
}

async function closeObsSocket(socket) {
  if (!socket) return;
  if (socket.readyState === WebSocket.OPEN || socket.readyState === WebSocket.CONNECTING) {
    socket.close(1000, 'done');
    await delay(0);
  }
}

async function callObs(requestType, requestData) {
  let socket;
  try {
    socket = await openObsSocket();
    const requestId = nextRequestId();
    socket.send(JSON.stringify({
      op: 6,
      d: {
        requestType,
        requestId,
        requestData: requestData || {}
      }
    }));

    const response = await waitForSocketMessage(
      socket,
      payload => payload && payload.op === 7 && payload.d && payload.d.requestId === requestId,
      WS_TIMEOUT_MS
    );

    if (!response.d || !response.d.requestStatus || response.d.requestStatus.result !== true) {
      const comment = response.d && response.d.requestStatus && response.d.requestStatus.comment;
      throw new Error(comment || `OBS request failed: ${requestType}`);
    }

    return (response.d && response.d.responseData) || {};
  } finally {
    await closeObsSocket(socket);
  }
}

async function getObsInputText(inputName) {
  const responseData = await callObs('GetInputSettings', { inputName });
  if (!responseData || !responseData.inputSettings) return '';
  return responseData.inputSettings.text || '';
}

function parseControlBridgeState(controlText) {
  if (!controlText) return null;

  try {
    const payload = JSON.parse(controlText);
    if (!payload || payload.kind !== 'state') return null;
    return payload;
  } catch (error) {
    return null;
  }
}

async function loadStateViaObsSources() {
  // Read SP Control text source — this contains the full state JSON
  // written by the Lua script every tick via update_control_bridge_state().
  const controlText = await getObsInputText('SP Control');

  const controlState = parseControlBridgeState(controlText);
  if (!controlState) {
    // SP Control exists but has no state JSON yet (timer idle, or command was just processed).
    // Return a default idle state — the source IS available, just no active session.
    return {
      is_running: false, is_paused: false, resume_available: false,
      session_type: 'Ready', current_time: 0, total_time: 0,
      elapsed_seconds: 0, progress_percent: 0,
      completed_focus_sessions: 0, goal_sessions: 0,
      total_focus_seconds: 0, cycle_count: 0, stream_duration: 0,
      timer_mode: 'pomodoro', custom_segment_name: '',
      custom_segment_index: 0, custom_segment_count: 0,
      is_overtime: false, overtime_seconds: 0,
      next_session_type: '', break_suggestion: '',
      show_transition: false, transition_message: '',
      chat_status_line: '', status_active: false,
      status_message: '', status_until_epoch: 0, ends_at: ''
    };
  }

  const totalTime = Number(controlState.total_time) || 0;
  const currentTime = Number(controlState.current_time) || 0;
  return {
    is_running: !!controlState.is_running,
    is_paused: !!controlState.is_paused,
    resume_available: !!controlState.resume_available,
    session_type: controlState.session_type || (controlState.is_running ? 'Focus' : 'Ready'),
    current_time: currentTime,
    total_time: totalTime,
    elapsed_seconds: Math.max(0, totalTime - currentTime),
    progress_percent: Number(controlState.progress_percent) || 0,
    completed_focus_sessions: Number(controlState.completed_focus_sessions) || 0,
    goal_sessions: Number(controlState.goal_sessions) || 0,
    total_focus_seconds: Number(controlState.total_focus_seconds) || 0,
    cycle_count: Number(controlState.cycle_count) || 0,
    stream_duration: Number(controlState.stream_duration) || 0,
    timer_mode: controlState.timer_mode || 'pomodoro',
    custom_segment_name: controlState.custom_segment_name || '',
    custom_segment_index: Number(controlState.custom_segment_index) || 0,
    custom_segment_count: Number(controlState.custom_segment_count) || 0,
    is_overtime: !!controlState.is_overtime,
    overtime_seconds: Number(controlState.overtime_seconds) || 0,
    next_session_type: controlState.next_session_type || '',
    break_suggestion: controlState.break_suggestion || '',
    show_transition: !!controlState.show_transition,
    transition_message: controlState.transition_message || '',
    chat_status_line: controlState.chat_status_line || '',
    status_active: !!controlState.status_active,
    status_message: controlState.status_message || '',
    status_until_epoch: Number(controlState.status_until_epoch) || 0,
    ends_at: controlState.ends_at || ''
  };
}

// ── Formatting ──
function formatTime(seconds) {
  if (seconds == null || seconds < 0) return '--:--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '0m';
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const rm = mins % 60;
  return rm === 0 ? `${h}h` : `${h}h ${rm}m`;
}

    btnResumePrevious.disabled = !wsConnected || controlActionInFlight;
    btnStartPauseLabel.textContent = 'Start';
    btnStartPause.querySelector('.icon').textContent = '▶';
    return;
  }

  const { is_running, is_paused, resume_available, session_type, current_time, total_time,
          completed_focus_sessions, goal_sessions, total_focus_seconds,
          cycle_count, show_transition, transition_message, timer_mode,
          custom_segment_name, custom_segment_index, custom_segment_count,
          is_overtime, overtime_seconds, next_session_type,
          sessions_remaining, break_suggestion, stream_duration,
          chat_status_line, ends_at, progress_percent } = state;

  const mode = timer_mode || 'pomodoro';
  const overtime = is_overtime || false;

  // Mode badge
  modeBadge.textContent = mode;

  // Control button state
  if (is_running && !is_paused) {
    btnStartPauseLabel.textContent = 'Pause';
    btnStartPause.querySelector('.icon').textContent = '⏸';
  } else if (is_running && is_paused) {
    btnStartPauseLabel.textContent = 'Resume';
    btnStartPause.querySelector('.icon').textContent = '▶';
  } else {
    btnStartPauseLabel.textContent = 'Start';
    btnStartPause.querySelector('.icon').textContent = '▶';
  }

  const canResumePrevious = !!resume_available && !is_running;
  btnResumePrevious.disabled = controlActionInFlight || !wsConnected || !canResumePrevious;

  // Status dot
  if (overtime) {
    statusDot.className = 'status-dot overtime';
  } else if (is_running && !is_paused) {
    statusDot.className = 'status-dot running';
  } else if (is_running && is_paused) {
    statusDot.className = 'status-dot paused';
  } else {
    statusDot.className = 'status-dot';
  }

  // Time
  if (overtime) {
    timeEl.textContent = '+' + formatTime(overtime_seconds || 0);
    timeEl.className = 'time-display overtime';
  } else {
    timeEl.textContent = formatTime(current_time);
    timeEl.className = is_running ? 'time-display' : 'time-display idle';
  }

  // Badge
  let badgeText = session_type || 'Ready';
  let badgeCls = BADGE_CLASSES[session_type] || 'idle';

  if (overtime) {
    badgeText = (session_type || 'Session') + ' · Overtime';
    badgeCls = 'overtime';
  } else if (mode === 'stopwatch') {
    badgeText = 'Stopwatch';
    badgeCls = 'stopwatch';
  } else if (mode === 'countdown') {
    badgeText = 'Countdown';
    badgeCls = 'countdown';
  } else if (mode === 'custom' && custom_segment_name) {
    badgeText = custom_segment_name;
    badgeCls = 'custom';
  }

  if (is_paused && !overtime) badgeText += ' · Paused';
  if (!is_running) { badgeText = 'Ready'; badgeCls = 'idle'; }
  badgeEl.textContent = badgeText;
  badgeEl.className = 'session-badge ' + badgeCls;

  // Progress bar
  let progress = 0;
  let fillCls = overtime ? 'overtime' : badgeCls;
  if (overtime) {
    progress = 100;
  } else if (mode === 'stopwatch') {
    progress = ((current_time % 3600) / 3600) * 100;
  } else if (total_time > 0) {
    progress = ((total_time - current_time) / total_time) * 100;
  }
  if (!is_running) fillCls = 'idle';
  progressFill.style.width = progress + '%';
  progressFill.className = 'progress-fill ' + fillCls;

  // Transition message
  if (show_transition && transition_message) {
    transEl.textContent = transition_message;
    transEl.classList.add('visible');
  } else {
    transEl.classList.remove('visible');
  }

  // Break suggestion
  if (break_suggestion && is_running && session_type !== 'Focus' && !overtime) {
    suggestionEl.textContent = '💡 ' + break_suggestion;
  } else {
    suggestionEl.textContent = '';
  }

  // Next up + ends at
  if (next_session_type && is_running && !overtime) {
    let nextText = `Next: ${next_session_type}`;
    if (ends_at) nextText += ` · Ends ${ends_at}`;
    nextUpEl.textContent = nextText;
  } else if (ends_at && is_running && !overtime) {
    nextUpEl.textContent = `Ends at ${ends_at}`;
  } else {
    nextUpEl.textContent = '';
  }

  // Stats
  if (mode === 'pomodoro') {
    let sessText = `${completed_focus_sessions || 0}/${goal_sessions || 0}`;
    if (state.focus_streak && state.focus_streak > 1) {
      sessText += ` 🔥${state.focus_streak}`;
    }
    sessionsEl.textContent = sessText;
    cycleEl.textContent = cycle_count || 0;
  } else if (mode === 'custom') {
    sessionsEl.textContent = `${custom_segment_index || 1}/${custom_segment_count || 0}`;
    cycleEl.textContent = '-';
  } else {
    sessionsEl.textContent = '-';
    cycleEl.textContent = '-';
  }
  focusTimeEl.textContent = formatDuration(total_focus_seconds);
  elapsedEl.textContent = (progress_percent != null ? progress_percent : Math.round(progress)) + '%';

  // Stream duration
  const streamItem = document.getElementById('streamItem');
  const streamSep = document.getElementById('streamSep');
  if (stream_duration && stream_duration > 0) {
    streamTimeEl.textContent = formatDuration(stream_duration);
    streamItem.style.display = '';
    streamSep.style.display = '';
  } else {
    streamTimeEl.textContent = '--';
    streamItem.style.display = 'none';
    streamSep.style.display = 'none';
  }

  // Chat status line
  if (chat_status_line && chat_status_line !== '--') {
    chatStatusEl.textContent = chat_status_line;
    chatCopyEl.style.display = '';
  } else {
    chatStatusEl.textContent = '--';
    chatCopyEl.style.display = 'none';
  }

  // Session label
  const labelRow = document.getElementById('labelRow');
  const labelEl = document.getElementById('sessionLabel');
  if (state.session_label && state.session_label.trim()) {
    labelRow.style.display = '';
    labelEl.textContent = state.session_label;
  } else {
    labelRow.style.display = 'none';
  }

  const statusRow = document.getElementById('statusRow');
  const statusMessageEl = document.getElementById('statusMessage');
  if (state.status_active && state.status_message && state.status_message.trim()) {
    statusRow.style.display = '';
    statusMessageEl.textContent = state.status_message;
  } else {
    statusRow.style.display = 'none';
  }

  syncStatusEditorFromState(state);

  // Daily goal
  const goalRow = document.getElementById('dailyGoalRow');
  const goalFill = document.getElementById('dailyGoalFill');
  const goalText = document.getElementById('dailyGoalText');
  const goalPct = document.getElementById('dailyGoalPct');
  if (state.daily_goal_seconds && state.daily_goal_seconds > 0) {
    goalRow.style.display = '';
    const dailySec = state.daily_focus_seconds || 0;
    const goalSec = state.daily_goal_seconds;
    const pct = Math.min(100, Math.round((dailySec / goalSec) * 100));
    goalFill.style.width = pct + '%';
    goalPct.textContent = pct + '%';
    goalText.textContent = `Daily: ${formatDuration(dailySec)} / ${formatDuration(goalSec)}`;
    if (pct >= 100) {
      goalFill.style.background = '#22c55e';
    } else {
      goalFill.style.background = '';
    }
  } else {
    goalRow.style.display = 'none';
  }
}

// ── Polling ──
let lastState = null;
let consecutiveFetchFailures = 0;
let pollInFlight = false;
let pollTimer = null;
let pollStopped = false;

async function poll() {
  if (pollStopped || pollInFlight) return;
  pollInFlight = true;
  try {
    await refreshStateSnapshot();
  } finally {
    pollInFlight = false;
    if (!pollStopped) {
      pollTimer = setTimeout(poll, POLL_INTERVAL);
    }
  }
}
setStateStatus('connecting', 'Connecting to SP Control via WebSocket...');
poll();
window.addEventListener('beforeunload', () => {
  pollStopped = true;
  if (pollTimer) clearTimeout(pollTimer);
  if (wsProbeTimer) clearTimeout(wsProbeTimer);
  actionRefreshTimers.forEach(timerId => clearTimeout(timerId));
  actionRefreshTimers = [];
});

// ── Initialize WebSocket ──
connectWebSocket().finally(scheduleWsProbe);

</script>
