<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SessionPulse — Control Dock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1b26;
    --surface: #24253a;
    --surface-hover: #2d2e45;
    --surface-active: #363852;
    --border: rgba(255, 255, 255, 0.06);
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --focus-color: #22c55e;
    --short-break-color: #3b82f6;
    --long-break-color: #a855f7;
    --stopwatch-color: #f59e0b;
    --countdown-color: #f97316;
    --overtime-color: #ef4444;
    --idle-color: #475569;
    --danger: #ef4444;
    --ws-connected: #22c55e;
    --ws-disconnected: #ef4444;
    --ws-connecting: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 12px;
    min-width: 200px;
    user-select: none;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .header-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-muted);
  }

  .header-badges {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mode-badge {
    font-size: 0.5rem;
    padding: 1px 5px;
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .ws-indicator {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.45rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .ws-indicator:hover { background: var(--surface-hover); }
  .ws-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ws-disconnected);
    transition: background 0.3s;
  }
  .ws-dot.connected { background: var(--ws-connected); }
  .ws-dot.connecting { background: var(--ws-connecting); animation: blink 1s infinite; }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--idle-color);
    transition: background 0.3s;
  }
  .status-dot.running { background: var(--focus-color); }
  .status-dot.paused { background: #eab308; animation: blink 1.5s infinite; }
  .status-dot.overtime { background: var(--overtime-color); animation: blink 0.8s infinite; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .timer-section {
    text-align: center;
    padding: 14px 0 10px;
  }

  .session-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 99px;
    margin-bottom: 8px;
    transition: background 0.3s, color 0.3s;
  }
  .session-badge.focus { background: rgba(34, 197, 94, 0.15); color: var(--focus-color); }
  .session-badge.short-break { background: rgba(59, 130, 246, 0.15); color: var(--short-break-color); }
  .session-badge.long-break { background: rgba(168, 85, 247, 0.15); color: var(--long-break-color); }
  .session-badge.idle { background: rgba(71, 85, 105, 0.2); color: var(--text-muted); }
  .session-badge.stopwatch { background: rgba(245, 158, 11, 0.15); color: var(--stopwatch-color); }
  .session-badge.countdown { background: rgba(249, 115, 22, 0.15); color: var(--countdown-color); }
  .session-badge.custom { background: rgba(34, 197, 94, 0.15); color: var(--focus-color); }
  .session-badge.overtime { background: rgba(239, 68, 68, 0.15); color: var(--overtime-color); }

  .time-display {
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
    transition: color 0.3s;
  }
  .time-display.idle { color: var(--text-muted); }
  .time-display.overtime { color: var(--overtime-color); }

  .next-up {
    font-size: 0.6rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Control Buttons */
  .controls {
    display: flex;
    gap: 4px;
    margin: 10px 0;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    flex: 1;
    min-width: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    border-radius: 6px;
    padding: 7px 2px;
    font-size: 0.65rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    white-space: nowrap;
  }
  .ctrl-btn:hover { background: var(--surface-hover); color: var(--text-primary); }
  .ctrl-btn:active { background: var(--surface-active); transform: scale(0.97); }
  .ctrl-btn.primary {
    background: rgba(34, 197, 94, 0.15);
    border-color: rgba(34, 197, 94, 0.25);
    color: var(--focus-color);
  }
  .ctrl-btn.primary:hover { background: rgba(34, 197, 94, 0.25); }
  .ctrl-btn.danger {
    background: rgba(239, 68, 68, 0.1);
    border-color: rgba(239, 68, 68, 0.2);
    color: var(--danger);
  }
  .ctrl-btn.danger:hover { background: rgba(239, 68, 68, 0.2); }
  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none !important;
  }
  .ctrl-btn .icon { font-size: 0.8rem; }

  .controls-row2 {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }

  .progress-track {
    height: 4px;
    background: var(--surface);
    border-radius: 99px;
    margin: 0 0 8px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 0.8s ease, background 0.3s;
  }
  .progress-fill.focus { background: var(--focus-color); }
  .progress-fill.short-break { background: var(--short-break-color); }
  .progress-fill.long-break { background: var(--long-break-color); }
  .progress-fill.stopwatch { background: var(--stopwatch-color); }
  .progress-fill.countdown { background: var(--countdown-color); }
  .progress-fill.custom { background: var(--focus-color); }
  .progress-fill.overtime { background: var(--overtime-color); }
  .progress-fill.idle { background: var(--idle-color); }

  .transition-msg {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 4px 0;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .transition-msg.visible { opacity: 1; }

  .break-suggestion {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 500;
    color: var(--text-muted);
    font-style: italic;
    min-height: 16px;
    margin-bottom: 4px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 8px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .stat-card {
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }

  .stat-label {
    font-size: 0.55rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .stat-card.full { grid-column: 1 / -1; }

  .chat-copy {
    margin-top: 6px;
    padding: 6px 8px;
    background: var(--surface);
    border-radius: 6px;
    font-size: 0.6rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: background 0.15s;
    min-height: 28px;
  }
  .chat-copy:hover { background: var(--surface-hover); }
  .chat-copy .label { font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .chat-copy .value { color: var(--text-secondary); font-variant-numeric: tabular-nums; }
  .chat-copy.copied { background: rgba(34, 197, 94, 0.15); }
  .chat-copy.copied .label { color: var(--focus-color); }

  .footer {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.55rem;
    color: var(--text-muted);
  }
</style>
</head>
<body>

<div class="header">
  <span class="header-title">SessionPulse</span>
  <div class="header-badges">
    <span class="mode-badge" id="modeBadge">pomodoro</span>
    <div class="ws-indicator" id="wsIndicator" title="Click to reconnect">
      <div class="ws-dot" id="wsDot"></div>
      <span id="wsLabel">WS</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>
</div>

<div class="timer-section">
  <div class="session-badge idle" id="badge">Ready</div>
  <div class="time-display idle" id="time">--:--</div>
  <div class="next-up" id="nextUp"></div>
</div>

<!-- Control Buttons -->
<div class="controls" id="controlsRow">
  <button class="ctrl-btn primary" id="btnStartPause" title="Start / Pause">
    <span class="icon">▶</span> <span id="btnStartPauseLabel">Start</span>
  </button>
  <button class="ctrl-btn" id="btnSkip" title="Skip Session">
    <span class="icon">⏭</span> Skip
  </button>
  <button class="ctrl-btn danger" id="btnStop" title="Stop">
    <span class="icon">⏹</span> Stop
  </button>
</div>
<div class="controls-row2" id="controlsRow2">
  <button class="ctrl-btn" id="btnSubTime" title="Subtract Time">
    <span class="icon">−</span> Time
  </button>
  <button class="ctrl-btn" id="btnAddTime" title="Add Time">
    <span class="icon">+</span> Time
  </button>
  <button class="ctrl-btn danger" id="btnReset" title="Reset All">
    <span class="icon">↺</span> Reset
  </button>
</div>

<div class="progress-track">
  <div class="progress-fill idle" id="progressFill"></div>
</div>

<div class="break-suggestion" id="suggestion"></div>
<div class="transition-msg" id="transition"></div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-value" id="sessions">0/0</div>
    <div class="stat-label">Sessions</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="focusTime">0m</div>
    <div class="stat-label">Focus Time</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="cycle">0</div>
    <div class="stat-label">Cycle</div>
  </div>
  <div class="stat-card">
    <div class="stat-value" id="elapsed">0%</div>
    <div class="stat-label">Progress</div>
  </div>
  <div class="stat-card full">
    <div class="stat-value" id="streamTime">--</div>
    <div class="stat-label">Stream Duration</div>
  </div>
</div>

<div class="chat-copy" id="chatCopy" title="Click to copy chat status">
  <span class="label">Chat</span>
  <span class="value" id="chatStatus">--</span>
</div>

<div class="footer" id="footerText">
  v5.0 · Hotkeys or buttons to control
</div>

<script type="module">
import { OBSWebSocket } from 'https://cdn.jsdelivr.net/npm/obs-websocket-js@5.0.8/+esm';

// ── Config ──
const POLL_INTERVAL = 500;
const WS_RECONNECT_DELAY = 5000;

// Parse URL params: ?ws_port=4455&ws_password=xxx
const params = new URLSearchParams(window.location.search);
const wsPort = params.get('ws_port') || localStorage.getItem('obs_ws_port') || '4455';
const wsPassword = params.get('ws_password') || localStorage.getItem('obs_ws_password') || '';

// Persist config
if (params.get('ws_port')) localStorage.setItem('obs_ws_port', wsPort);
if (params.get('ws_password')) localStorage.setItem('obs_ws_password', wsPassword);

// ── DOM Elements ──
const timeEl = document.getElementById('time');
const badgeEl = document.getElementById('badge');
const statusDot = document.getElementById('statusDot');
const modeBadge = document.getElementById('modeBadge');
const progressFill = document.getElementById('progressFill');
const transEl = document.getElementById('transition');
const suggestionEl = document.getElementById('suggestion');
const nextUpEl = document.getElementById('nextUp');
const sessionsEl = document.getElementById('sessions');
const focusTimeEl = document.getElementById('focusTime');
const cycleEl = document.getElementById('cycle');
const elapsedEl = document.getElementById('elapsed');
const streamTimeEl = document.getElementById('streamTime');
const chatStatusEl = document.getElementById('chatStatus');
const chatCopyEl = document.getElementById('chatCopy');
const wsDot = document.getElementById('wsDot');
const wsLabel = document.getElementById('wsLabel');
const wsIndicator = document.getElementById('wsIndicator');
const btnStartPause = document.getElementById('btnStartPause');
const btnStartPauseLabel = document.getElementById('btnStartPauseLabel');
const btnStop = document.getElementById('btnStop');
const btnSkip = document.getElementById('btnSkip');
const btnAddTime = document.getElementById('btnAddTime');
const btnSubTime = document.getElementById('btnSubTime');
const btnReset = document.getElementById('btnReset');

const BADGE_CLASSES = {
  'Focus': 'focus', 'Short Break': 'short-break', 'Long Break': 'long-break',
};

// ── OBS WebSocket ──
const obs = new OBSWebSocket();
let wsConnected = false;
let wsReconnectTimer = null;

function setWsStatus(status) {
  wsDot.className = 'ws-dot ' + status;
  wsLabel.textContent = status === 'connected' ? 'WS ✓' : status === 'connecting' ? 'WS…' : 'WS ✗';
  wsConnected = (status === 'connected');
  // Buttons work regardless — they just trigger hotkeys via WS
  [btnStartPause, btnStop, btnSkip, btnAddTime, btnSubTime, btnReset].forEach(b => {
    b.disabled = !wsConnected;
  });
}

async function connectWebSocket() {
  if (wsConnected) return;
  setWsStatus('connecting');
  try {
    await obs.connect(`ws://127.0.0.1:${wsPort}`, wsPassword || undefined);
    setWsStatus('connected');
    console.log('[Dock] WebSocket connected');
  } catch (e) {
    console.warn('[Dock] WebSocket failed:', e.message);
    setWsStatus('disconnected');
    scheduleReconnect();
  }
}

obs.on('ConnectionClosed', () => {
  setWsStatus('disconnected');
  console.log('[Dock] WebSocket disconnected');
  scheduleReconnect();
});

function scheduleReconnect() {
  if (wsReconnectTimer) clearTimeout(wsReconnectTimer);
  wsReconnectTimer = setTimeout(connectWebSocket, WS_RECONNECT_DELAY);
}

wsIndicator.addEventListener('click', () => {
  if (!wsConnected) connectWebSocket();
});

// ── Hotkey Triggers via WebSocket ──
async function triggerHotkey(hotkeyName) {
  if (!wsConnected) return;
  try {
    await obs.call('TriggerHotkeyByName', { hotkeyName });
  } catch (e) {
    console.warn('[Dock] Hotkey trigger failed:', hotkeyName, e.message);
  }
}

btnStartPause.addEventListener('click', () => triggerHotkey('session_pulse_start_pause'));
btnStop.addEventListener('click', () => triggerHotkey('session_pulse_stop'));
btnSkip.addEventListener('click', () => triggerHotkey('session_pulse_skip'));
btnAddTime.addEventListener('click', () => triggerHotkey('session_pulse_add_time'));
btnSubTime.addEventListener('click', () => triggerHotkey('session_pulse_sub_time'));
btnReset.addEventListener('click', async () => {
  // Reset = Stop then clear. We simulate by triggering stop.
  // Since there's no dedicated reset hotkey, stop is the closest action.
  await triggerHotkey('session_pulse_stop');
});

// ── Chat Copy ──
chatCopyEl.addEventListener('click', () => {
  const text = chatStatusEl.textContent;
  if (text && text !== '--') {
    navigator.clipboard.writeText(text).then(() => {
      chatCopyEl.classList.add('copied');
      chatCopyEl.querySelector('.label').textContent = 'Copied!';
      setTimeout(() => {
        chatCopyEl.classList.remove('copied');
        chatCopyEl.querySelector('.label').textContent = 'Chat';
      }, 1500);
    });
  }
});

// ── Formatting ──
function formatTime(seconds) {
  if (seconds == null || seconds < 0) return '--:--';
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatDuration(seconds) {
  if (!seconds || seconds <= 0) return '0m';
  const mins = Math.floor(seconds / 60);
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const rm = mins % 60;
  return rm === 0 ? `${h}h` : `${h}h ${rm}m`;
}

// ── State Update ──
function update(state) {
  if (!state) {
    timeEl.textContent = '--:--';
    timeEl.className = 'time-display idle';
    badgeEl.textContent = 'Offline';
    badgeEl.className = 'session-badge idle';
    statusDot.className = 'status-dot';
    progressFill.style.width = '0%';
    progressFill.className = 'progress-fill idle';
    transEl.classList.remove('visible');
    suggestionEl.textContent = '';
    nextUpEl.textContent = '';
    sessionsEl.textContent = '0/0';
    focusTimeEl.textContent = '0m';
    cycleEl.textContent = '0';
    elapsedEl.textContent = '0%';
    streamTimeEl.textContent = '--';
    modeBadge.textContent = '--';
    chatStatusEl.textContent = '--';
    btnStartPauseLabel.textContent = 'Start';
    btnStartPause.querySelector('.icon').textContent = '▶';
    return;
  }

  const { is_running, is_paused, session_type, current_time, total_time,
          completed_focus_sessions, goal_sessions, total_focus_seconds,
          cycle_count, show_transition, transition_message, timer_mode,
          custom_segment_name, custom_segment_index, custom_segment_count,
          is_overtime, overtime_seconds, next_session_type,
          sessions_remaining, break_suggestion, stream_duration,
          chat_status_line } = state;

  const mode = timer_mode || 'pomodoro';
  const overtime = is_overtime || false;

  // Mode badge
  modeBadge.textContent = mode;

  // Control button state
  if (is_running && !is_paused) {
    btnStartPauseLabel.textContent = 'Pause';
    btnStartPause.querySelector('.icon').textContent = '⏸';
  } else if (is_running && is_paused) {
    btnStartPauseLabel.textContent = 'Resume';
    btnStartPause.querySelector('.icon').textContent = '▶';
  } else {
    btnStartPauseLabel.textContent = 'Start';
    btnStartPause.querySelector('.icon').textContent = '▶';
  }

  // Status dot
  if (overtime) {
    statusDot.className = 'status-dot overtime';
  } else if (is_running && !is_paused) {
    statusDot.className = 'status-dot running';
  } else if (is_running && is_paused) {
    statusDot.className = 'status-dot paused';
  } else {
    statusDot.className = 'status-dot';
  }

  // Time
  if (overtime) {
    timeEl.textContent = '+' + formatTime(overtime_seconds || 0);
    timeEl.className = 'time-display overtime';
  } else {
    timeEl.textContent = formatTime(current_time);
    timeEl.className = is_running ? 'time-display' : 'time-display idle';
  }

  // Badge
  let badgeText = session_type || 'Ready';
  let badgeCls = BADGE_CLASSES[session_type] || 'idle';

  if (overtime) {
    badgeText = (session_type || 'Session') + ' · Overtime';
    badgeCls = 'overtime';
  } else if (mode === 'stopwatch') {
    badgeText = 'Stopwatch';
    badgeCls = 'stopwatch';
  } else if (mode === 'countdown') {
    badgeText = 'Countdown';
    badgeCls = 'countdown';
  } else if (mode === 'custom' && custom_segment_name) {
    badgeText = custom_segment_name;
    badgeCls = 'custom';
  }

  if (is_paused && !overtime) badgeText += ' · Paused';
  if (!is_running) { badgeText = 'Ready'; badgeCls = 'idle'; }
  badgeEl.textContent = badgeText;
  badgeEl.className = 'session-badge ' + badgeCls;

  // Progress bar
  let progress = 0;
  let fillCls = overtime ? 'overtime' : badgeCls;
  if (overtime) {
    progress = 100;
  } else if (mode === 'stopwatch') {
    progress = ((current_time % 3600) / 3600) * 100;
  } else if (total_time > 0) {
    progress = ((total_time - current_time) / total_time) * 100;
  }
  if (!is_running) fillCls = 'idle';
  progressFill.style.width = progress + '%';
  progressFill.className = 'progress-fill ' + fillCls;

  // Transition message
  if (show_transition && transition_message) {
    transEl.textContent = transition_message;
    transEl.classList.add('visible');
  } else {
    transEl.classList.remove('visible');
  }

  // Break suggestion
  if (break_suggestion && is_running && session_type !== 'Focus' && !overtime) {
    suggestionEl.textContent = '💡 ' + break_suggestion;
  } else {
    suggestionEl.textContent = '';
  }

  // Next up
  if (next_session_type && is_running && !overtime) {
    nextUpEl.textContent = `Next: ${next_session_type}`;
  } else {
    nextUpEl.textContent = '';
  }

  // Stats
  if (mode === 'pomodoro') {
    sessionsEl.textContent = `${completed_focus_sessions || 0}/${goal_sessions || 0}`;
    cycleEl.textContent = cycle_count || 0;
  } else if (mode === 'custom') {
    sessionsEl.textContent = `${custom_segment_index || 1}/${custom_segment_count || 0}`;
    cycleEl.textContent = '-';
  } else {
    sessionsEl.textContent = '-';
    cycleEl.textContent = '-';
  }
  focusTimeEl.textContent = formatDuration(total_focus_seconds);
  elapsedEl.textContent = Math.round(progress) + '%';

  // Stream duration
  if (stream_duration && stream_duration > 0) {
    streamTimeEl.textContent = formatDuration(stream_duration);
  } else {
    streamTimeEl.textContent = '--';
  }

  // Chat status line
  chatStatusEl.textContent = chat_status_line || '--';
}

// ── Polling ──
let lastState = null;

async function poll() {
  try {
    const resp = await fetch('session_state.json?t=' + Date.now());
    if (resp.ok) {
      lastState = await resp.json();
      update(lastState);
    } else {
      update(null);
    }
  } catch (e) {
    update(lastState);
  }
}

poll();
setInterval(poll, POLL_INTERVAL);

// ── Initialize WebSocket ──
connectWebSocket();
